worker_processes 1;

events {
        worker_connections 1024;
    }

    http {
        server {
            # Railway передаёт порт через переменную, в Nginx её можно подставить при запуске
            listen 3000;

            location /v4/ {
                proxy_pass https://api2.sec-tunnel.com/v4/;

                # Подменяем Host, чтобы сервер Opera нас принял
                proxy_set_header Host api2.sec-tunnel.com;

                # Удаляем заголовки, выдающие прокси
                proxy_set_header X-Forwarded-For "";
                proxy_set_header X-Forwarded-Proto "";
                proxy_set_header X-Real-IP "";

                # Включаем поддержку SSL к Opera
                proxy_ssl_server_name on;
            }

            # Все остальные запросы отбиваем
            location / {
                return 404 "Not found. This relay only proxies /v4/* to api2.sec-tunnel.com.";
            }
        }
    }
